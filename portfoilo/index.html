  <h1>Portfoilo</h1>
    <main id="main">
        <section id="sliderType04">
            <div class="slider__wrap">
                <div class="slider__img">
                    <div class="slider__inner">
                        <div class="slider" role="group" aria-label="1/5">
                            <img src="../img/가요.svg" alt="이미지6">
                        </div>
                        <div class="slider" role="group" aria-label="2/5">
                          <img src="../img/네트.svg" alt="이미지6">
                        </div>
                        <div class="slider" role="group" aria-label="3/5">
                          <img src="../img/밥뭇나.svg" alt="이미지6">
                        </div>
                        <div class="slider" role="group" aria-label="4/5">
                          <img src="../img/코넥스.svg" alt="이미지6">
                        </div>
                        <div class="slider" role="group" aria-label="5/5">
                          <img src="../img/하프.svg" alt="이미지6">
                        </div>
                    </div>
                </div>

                <div class="slider__btn">
                    <a href="#" class="prev" role="button" aria-label="왼쪽 이미지">prev</a>
                    <a href="#" class="next" role="button" aria-label="오른쪽 이미지">next</a>
                </div>

                <div class="slider__dot"></div>
            </div>
        </section>
    </main>

     <!-- Footer -->
     <footer>
        instagram: <a href="https://www.instagram.com/winsome_0113" target="_blank">winsome_0113</a> |

        github: <a href="https://github.com/Rohyoohyun">Rohyoohyun</a>
     </footer>
    <script>
        const sliderWrap = document.querySelector(".slider__wrap");
        const sliderImg = document.querySelector(".slider__img");   //보여지는 영역
        const sliderInner = document.querySelector(".slider__inner"); //움직이는 영역
        const slider = document.querySelectorAll(".slider");      //각각의 이미지
        const sliderBtn = document.querySelector(".slider__btn");
        const sliderBtnPrev= sliderBtn.querySelector(".prev"); // 왼쪽버튼
        const sliderBtnNext = sliderBtn.querySelector(".next"); // 오른쪽 버튼
        const sliderDot = document.querySelector(".slider__dot"); // 닷메뉴

        let currentIndex = 0;                       //현재 이미지
        let sliderCount = slider.length;            //이미지 갯수
        let sliderWidth = sliderImg.offsetWidth;    //이미지 가로값

        let dotIndex = "";
        
        function intit(){
            // dot 만들기
            slider.forEach(() => dotIndex += "<a href='#' class='dot'></a>");
            sliderDot.innerHTML = dotIndex;

            //첫번째 닷 버튼 활성화 표시(active)
            sliderDot.firstChild.classList.add("active");

        }
        intit();

        //이미지 이동 스크립트
        function gotoSlider(num){
            sliderInner.style.transition = "all 400ms";
            sliderInner.style.transform = "translateX(" + -sliderWidth * num + "px)";
            currentIndex = num;
            let dotActive = document.querySelectorAll(".slider__dot .dot");
            dotActive.forEach(el => el.classList.remove("active"));
            dotActive[num].classList.add("active");
        }

        //버튼을 클릭할 때 이미지 이동 작동
        document.querySelectorAll(".slider__btn a").forEach((btn, index) => {
            btn.addEventListener("click", () => {
                let prevIndex = (currentIndex + (sliderCount - 1 )) % sliderCount;
                let nextIndex = (currentIndex + 1) % sliderCount;

                if(btn.classList.contains("prev")){
                    gotoSlider(prevIndex);
                }else{
                    gotoSlider(nextIndex);
                }
            });
        });

        //dot 메뉴를 클릭할 때 이미지 이동 작동
        document.querySelectorAll(".slider__dot .dot").forEach((dot, index) => {
            dot.addEventListener("click", () => {
                gotoSlider(index);
            });
        });
    </script>
</body>
