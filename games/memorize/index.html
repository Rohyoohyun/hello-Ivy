<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello Ivy: game - Memorize</title>
    <link rel="stylesheet" href="../memorize/styles.css">
</head>
<body>
    <header class="header">
        <a href="../index.html" class="fixed-title">Hello: Ivy</a>
        <nav>
            <a href="../about/index.html">About</a>
            <a href="../portfoilo/index.html">Portfolio</a>
            <a href="../study/index.html">Study</a>
            <a href="../index.html">Game</a>
        </nav>
    </header>
    <h1>Number Memorize</h1>
    <a href="../memorize/play/play.html" id="startButton">게임 시작</a>
    <button id="instructionsButton" onclick="showInstructions()">게임 설명</button>

    <div id="instructions">
        <h2>게임 설명</h2>
        <p>숫자 기억 게임은 격자 안에 나타난 숫자의 위치와 순서를 기억하는 게임입니다.</p>
        <p>숫자는 3초 동안 보여졌다가 물음표(?)로 바뀌고, 플레이어는 1부터 순서대로 클릭해야 합니다.</p>
        <p>난이도가 올라갈수록 숫자의 배치가 복잡해집니다.</p>
        <button id="backButton" onclick="goBack()">뒤로 가기</button>
    </div>
    <p style="color: #ccc">Hello: Ivy를 누르시면 이전 화면으로 돌아갑니다.</p>
    <script>
        // 게임 설명 보이기
        function showInstructions() {
            document.getElementById('instructions').style.display = 'block';
            document.getElementById('game').style.display = 'none';
        }

        // 뒤로 가기 버튼
        function goBack() {
            document.getElementById('instructions').style.display = 'none';
            document.getElementById('game').style.display = 'none';
            document.getElementById('startButton').style.display = 'inline-block';
            document.getElementById('instructionsButton').style.display = 'inline-block';
        }
    </script>
</body>
</html>
