<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello: Ivy</title>
    <style>
        body {
            background-color: #2E2E2E;
            font-family: Pretendard Variable;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100vw;
            padding: 1% 5%;
            box-sizing: border-box;
            border-bottom: 1px solid #555;
        }

        .fixed-title {
            color: #fff;
            text-shadow: 0 0 10px #dcdcdc, 0 0 20px #dcdcdc;
            text-decoration: none;
            font-size: 40px;
        }

        nav {
            display: flex;
            gap: 20px;
        }

        nav a {
            color: #ccc;
            text-decoration: none;
            font-size: 20px;
            transition: color 0.3s ease, text-shadow 0.3s ease;
        }

        nav a:hover {
            color: #FFF06B;
            text-shadow: 0 0 10px #ffe677, 0 0 20px #ffe677;
        }

        @media (max-width: 800px) {
            .header {
                flex-direction: column;
                align-items: flex-start;
                padding: 10px 20px;
            }

            .fixed-title {
                font-size: 30px;
            }

            nav {
                gap: 15px;
            }
        }

        @media (max-width: 500px) {
            .fixed-title {
                font-size: 24px;
            }

            nav a {
                font-size: 14px;
            }
        }

        .content {
            text-align: center;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .content h1 {
            font-size: 150px;
            color: #FFF06B;
            text-shadow: 0 0 10px #ffde4d, 0 0 20px #ffde4d;
            margin: 0;
            font-weight: thin;
            position: fixed;
            top: 10%;
            left: 5%;
        }

        .content h1 span {
            font-size: 200px;
            font-weight: bold;
        }

        .animated-line {
            width: 70%;
            height: 15px;
            background: linear-gradient(90deg, #2E2E2E, #555, #ccc);
            position: fixed;
            top: 80%;
            left: 30%;
            animation: moveGradient 2s linear infinite;
        }

        @keyframes moveGradient {
            0% {background-position: 0% 0;}
            100% {background-position: 100% 0;}
        }

        .video-container {
            position: fixed;
            top: 30%;
            right: 5%;
            transform: translate(-50%, -50%);
            width: 300px; /* 비디오 크기 */
            height: 500px; /* 비디오 크기 */
            overflow: hidden;
        }

        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        footer {
            position: fixed;
            top: 90%;
            left: 50%;
            transform: translateX(-50%);
            padding: 20px;
            font-size: 14px;
            color: #888;
            white-space: nowrap;
            text-align: center;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        footer a {
            color: #888;
            text-decoration: none;
        }

        footer a:hover {
            color: #ddd;
        }

        @media (max-width: 800px) {
            footer {
                font-size: 12px;
                padding: 15px;
            }
        }

        @media (max-width: 500px) {
            footer {
                font-size: 10px;
                padding: 10px;
            }
        }

    </style>
</head>
<body>
    <header class="header">
        <a href="./index.html" class="fixed-title">Hello: Ivy</a>
        <nav>
            <a href="./about/index.html">About</a>
            <a href="./portfoilo/index.html">Portfolio</a>
            <a href="./study/index.html">Study</a>
            <a href="./games/index.html">Game</a>
        </nav>
    </header>

    <div class="content">
        <h1><span id="typing-text"></span></h1>
    </div>

    <div class="animated-line"></div>
    <div class="video-container">
        <video src="./video/sample.mp4" autoplay loop muted></video>
    </div>

    <footer>
        instagram: <a href="https://www.instagram.com/winsome_0113" target="_blank">winsome_0113</a> | 
        email: <a href="mailto:unternehmen02191@gmail.com">unternehmen02191@gmail.com</a> | 
        github: <a href="https://github.com/Rohyoohyun">Rohyoohyun</a>
    </footer>

    <script>
        const text = "Hello: Ivy ";
        const typingText = document.getElementById('typing-text');
        let index = 0;
        let isDeleting = false;

        function typeText() {
            if (!isDeleting && index <= text.length) {
                typingText.textContent = text.slice(0, index);
                index++;
            } else if (isDeleting && index > 0) {
                typingText.textContent = text.slice(0, index);
                index--;
            }

            if (index === text.length) {
                isDeleting = true;
                setTimeout(typeText, 1000);
                return;
            } else if (index === 0) {
                isDeleting = false;
            }

            const typingSpeed = isDeleting ? 200 : 500;
            setTimeout(typeText, typingSpeed);
        }

        typeText();
    </script>
</body>
</html>
