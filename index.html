        body {

            font-family: Pretendard Variable;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        nav {
            display: flex;
            justify-content: flex-end;
            gap: 30px;
            padding: 20px 40px;
            font-size: 18px;
            border-bottom: 1px solid #555;
        }
        nav a {
            color: #ccc;

        }
        nav a:hover {
            color: #FFF06B;

        .content {
            text-align: center;
            flex-grow: 1;

        .content h1 {
            font-size: 150px;
            color: #FFF06B;
            text-shadow: 0 0 10px #ffde4d, 0 0 20px #ffde4d;
            margin: 0;
            font-weight: thin;
            position: fixed;
            top: 10%;
            left: 5%;
        }

        .content h1 span {
            font-size: 200px;
            font-weight: bold;
        }

        /* 움직이는 그라데이션 라인 */
        .animated-line {
            width: 70%; 
            height: 2px; 
            background: linear-gradient(90deg, #2E2E2E, #555, #ccc); /* 그라데이션 색상 */
            position: fixed;
            top: 80%;
            left: 30%;
            animation: moveGradient 2s linear infinite; 
        }

        /* 애니메이션 설정 */
        @keyframes moveGradient {
            0% {background-position: 0% 0;}
            100% {background-position: 100% 0;}
        }

        footer {
            position: fixed;
            top: 90%;
            left: 25%;
            padding: 20px;
            font-size: 14px;
            color: #888;
        }
        footer a {
            color: #888;
            text-decoration: none;
        }
        footer a:hover {
            color: #ddd;
        }
    </style>
